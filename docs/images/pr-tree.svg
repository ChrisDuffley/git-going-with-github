  <text x="24" y="191" fill="#e6edf3" font-family="SFMono-Regular,Consolas,Liberation Mono,Menlo,monospace" font-size="14" xml:space="preserve">│   ├── Local Pull Request Branches (checked out locally)</text>
  <text x="24" y="213" fill="#e6edf3" font-family="SFMono-Regular,Consolas,Liberation Mono,Menlo,monospace" font-size="14" xml:space="preserve">│   ├── All Open Pull Requests</text>
  <text x="24" y="235" fill="#e6edf3" font-family="SFMono-Regular,Consolas,Liberation Mono,Menlo,monospace" font-size="14" xml:space="preserve">│   └── All Closed Pull Requests</text>
