<svg xmlns="http://www.w3.org/2000/svg" width="549" height="260" viewBox="0 0 549 260">
  <rect width="549" height="260" fill="#161b22" stroke="#30363d" stroke-width="1" rx="8"/>
  <text x="24" y="37" fill="#e6edf3" font-family="SFMono-Regular,Consolas,Liberation Mono,Menlo,monospace" font-size="14" xml:space="preserve">GitHub Pull Requests</text>
  <text x="24" y="59" fill="#e6edf3" font-family="SFMono-Regular,Consolas,Liberation Mono,Menlo,monospace" font-size="14" xml:space="preserve">├── My Pull Requests</text>
  <text x="24" y="81" fill="#e6edf3" font-family="SFMono-Regular,Consolas,Liberation Mono,Menlo,monospace" font-size="14" xml:space="preserve">│   ├── Assigned to Me</text>
  <text x="24" y="103" fill="#e6edf3" font-family="SFMono-Regular,Consolas,Liberation Mono,Menlo,monospace" font-size="14" xml:space="preserve">│   ├── Created by Me</text>
  <text x="24" y="125" fill="#e6edf3" font-family="SFMono-Regular,Consolas,Liberation Mono,Menlo,monospace" font-size="14" xml:space="preserve">│   ├── Waiting for my Review</text>
  <text x="24" y="147" fill="#e6edf3" font-family="SFMono-Regular,Consolas,Liberation Mono,Menlo,monospace" font-size="14" xml:space="preserve">│   └── All Open</text>
