<svg xmlns="http://www.w3.org/2000/svg" width="708" height="194" viewBox="0 0 708 194">
  <rect width="708" height="194" fill="#161b22" stroke="#30363d" stroke-width="1" rx="8"/>
  <text x="24" y="37" fill="#e6edf3" font-family="SFMono-Regular,Consolas,Liberation Mono,Menlo,monospace" font-size="14" xml:space="preserve">your-repository/</text>
  <text x="24" y="59" fill="#e6edf3" font-family="SFMono-Regular,Consolas,Liberation Mono,Menlo,monospace" font-size="14" xml:space="preserve">└── .github/</text>
  <text x="24" y="81" fill="#e6edf3" font-family="SFMono-Regular,Consolas,Liberation Mono,Menlo,monospace" font-size="14" xml:space="preserve">    └── workflows/</text>
  <text x="24" y="103" fill="#e6edf3" font-family="SFMono-Regular,Consolas,Liberation Mono,Menlo,monospace" font-size="14" xml:space="preserve">        ├── ci.yml              ← Runs tests on every push/PR</text>
  <text x="24" y="125" fill="#e6edf3" font-family="SFMono-Regular,Consolas,Liberation Mono,Menlo,monospace" font-size="14" xml:space="preserve">        ├── lint.yml            ← Checks code style</text>
  <text x="24" y="147" fill="#e6edf3" font-family="SFMono-Regular,Consolas,Liberation Mono,Menlo,monospace" font-size="14" xml:space="preserve">        ├── a11y-scan.yml       ← Accessibility scanning</text>
  <text x="24" y="169" fill="#e6edf3" font-family="SFMono-Regular,Consolas,Liberation Mono,Menlo,monospace" font-size="14" xml:space="preserve">        └── deploy.yml          ← Deploys the site when code merges to main</text>
</svg>
