<svg xmlns="http://www.w3.org/2000/svg" width="540" height="458" viewBox="0 0 540 458">
  <rect width="540" height="458" fill="#161b22" stroke="#30363d" stroke-width="1" rx="8"/>
  <text x="24" y="37" fill="#e6edf3" font-family="SFMono-Regular,Consolas,Liberation Mono,Menlo,monospace" font-size="14" xml:space="preserve">┌────────────────────────────────────────────────────┐</text>
  <text x="24" y="59" fill="#e6edf3" font-family="SFMono-Regular,Consolas,Liberation Mono,Menlo,monospace" font-size="14" xml:space="preserve">│  Navigation bar (GitHub global nav)                │</text>
  <text x="24" y="81" fill="#e6edf3" font-family="SFMono-Regular,Consolas,Liberation Mono,Menlo,monospace" font-size="14" xml:space="preserve">│  avatar menu | Notifications | search               │</text>
  <text x="24" y="103" fill="#e6edf3" font-family="SFMono-Regular,Consolas,Liberation Mono,Menlo,monospace" font-size="14" xml:space="preserve">├────────────────────────────────────────────────────┤</text>
  <text x="24" y="125" fill="#e6edf3" font-family="SFMono-Regular,Consolas,Liberation Mono,Menlo,monospace" font-size="14" xml:space="preserve">│  Repository header                                  │</text>
  <text x="24" y="147" fill="#e6edf3" font-family="SFMono-Regular,Consolas,Liberation Mono,Menlo,monospace" font-size="14" xml:space="preserve">│  owner / repo-name  (h1)                            │</text>
  <text x="24" y="169" fill="#e6edf3" font-family="SFMono-Regular,Consolas,Liberation Mono,Menlo,monospace" font-size="14" xml:space="preserve">│  [Star] [Watch] [Fork] buttons                      │</text>
  <text x="24" y="191" fill="#e6edf3" font-family="SFMono-Regular,Consolas,Liberation Mono,Menlo,monospace" font-size="14" xml:space="preserve">├────────────────────────────────────────────────────┤</text>
  <text x="24" y="213" fill="#e6edf3" font-family="SFMono-Regular,Consolas,Liberation Mono,Menlo,monospace" font-size="14" xml:space="preserve">│  Repository navigation tabs (landmark)              │</text>
  <text x="24" y="235" fill="#e6edf3" font-family="SFMono-Regular,Consolas,Liberation Mono,Menlo,monospace" font-size="14" xml:space="preserve">│  &lt; Code &gt; Issues  Pull requests  Actions  etc.      │</text>
  <text x="24" y="257" fill="#e6edf3" font-family="SFMono-Regular,Consolas,Liberation Mono,Menlo,monospace" font-size="14" xml:space="preserve">├─────────────────────────────┬──────────────────────┤</text>
  <text x="24" y="279" fill="#e6edf3" font-family="SFMono-Regular,Consolas,Liberation Mono,Menlo,monospace" font-size="14" xml:space="preserve">│  File tree / code panel     │  Sidebar              │</text>
  <text x="24" y="301" fill="#e6edf3" font-family="SFMono-Regular,Consolas,Liberation Mono,Menlo,monospace" font-size="14" xml:space="preserve">│  Branch selector            │  About section        │</text>
  <text x="24" y="323" fill="#e6edf3" font-family="SFMono-Regular,Consolas,Liberation Mono,Menlo,monospace" font-size="14" xml:space="preserve">│  Files table (t:table)      │  Topics               │</text>
  <text x="24" y="345" fill="#e6edf3" font-family="SFMono-Regular,Consolas,Liberation Mono,Menlo,monospace" font-size="14" xml:space="preserve">│  Last commit message         │  Releases             │</text>
  <text x="24" y="367" fill="#e6edf3" font-family="SFMono-Regular,Consolas,Liberation Mono,Menlo,monospace" font-size="14" xml:space="preserve">├─────────────────────────────┴──────────────────────┤</text>
  <text x="24" y="389" fill="#e6edf3" font-family="SFMono-Regular,Consolas,Liberation Mono,Menlo,monospace" font-size="14" xml:space="preserve">│  README.md (rendered)                               │</text>
  <text x="24" y="411" fill="#e6edf3" font-family="SFMono-Regular,Consolas,Liberation Mono,Menlo,monospace" font-size="14" xml:space="preserve">│  (a separate landmark region)                       │</text>
  <text x="24" y="433" fill="#e6edf3" font-family="SFMono-Regular,Consolas,Liberation Mono,Menlo,monospace" font-size="14" xml:space="preserve">└────────────────────────────────────────────────────┘</text>
</svg>
