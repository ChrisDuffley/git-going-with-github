<svg xmlns="http://www.w3.org/2000/svg" width="488" height="260" viewBox="0 0 488 260">
  <rect width="488" height="260" fill="#161b22" stroke="#30363d" stroke-width="1" rx="8"/>
  <text x="24" y="37" fill="#e6edf3" font-family="SFMono-Regular,Consolas,Liberation Mono,Menlo,monospace" font-size="14" xml:space="preserve">Accessible Diff Viewer</text>
  <text x="24" y="59" fill="#e6edf3" font-family="SFMono-Regular,Consolas,Liberation Mono,Menlo,monospace" font-size="14" xml:space="preserve">├── Header (file path, change summary)</text>
  <text x="24" y="81" fill="#e6edf3" font-family="SFMono-Regular,Consolas,Liberation Mono,Menlo,monospace" font-size="14" xml:space="preserve">├── Hunk 1 of N</text>
  <text x="24" y="103" fill="#e6edf3" font-family="SFMono-Regular,Consolas,Liberation Mono,Menlo,monospace" font-size="14" xml:space="preserve">│   ├── Hunk location (line range)</text>
  <text x="24" y="125" fill="#e6edf3" font-family="SFMono-Regular,Consolas,Liberation Mono,Menlo,monospace" font-size="14" xml:space="preserve">│   ├── Unchanged lines (context)</text>
  <text x="24" y="147" fill="#e6edf3" font-family="SFMono-Regular,Consolas,Liberation Mono,Menlo,monospace" font-size="14" xml:space="preserve">│   ├── Modified/Added/Removed lines (with prefix)</text>
  <text x="24" y="169" fill="#e6edf3" font-family="SFMono-Regular,Consolas,Liberation Mono,Menlo,monospace" font-size="14" xml:space="preserve">│   └── More unchanged lines (context)</text>
  <text x="24" y="191" fill="#e6edf3" font-family="SFMono-Regular,Consolas,Liberation Mono,Menlo,monospace" font-size="14" xml:space="preserve">├── Hunk 2 of N</text>
  <text x="24" y="213" fill="#e6edf3" font-family="SFMono-Regular,Consolas,Liberation Mono,Menlo,monospace" font-size="14" xml:space="preserve">│   └── ...</text>
  <text x="24" y="235" fill="#e6edf3" font-family="SFMono-Regular,Consolas,Liberation Mono,Menlo,monospace" font-size="14" xml:space="preserve">└── Footer (totals: X additions, Y deletions)</text>
</svg>
