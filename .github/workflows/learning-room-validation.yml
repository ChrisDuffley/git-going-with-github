name: Learning Room PR Validation

on:
  pull_request:
    branches: [main]
    paths:
      - 'learning-room/**'

permissions:
  contents: read
  pull-requests: write

jobs:
  validate_learning_room:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          pip install requests
      
      - name: Validate Markdown syntax
        id: markdown
        run: |
          if command -v markdownlint &> /dev/null; then
            markdownlint "learning-room/**/*.md" || true
          else
            echo "markdownlint not found, skipping syntax check"
          fi
      
      - name: Check for broken links
        id: links
        run: |
          python .github/scripts/check_links.py learning-room/ || true
      
      - name: Validate accessibility
        id: accessibility
        run: |
          python .github/scripts/check_accessibility.py learning-room/ || true
      
      - name: Post feedback comment
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            
            let feedback = { errors: [], warnings: [] };
            
            // Try to read validation results if they exist
            try {
              if (fs.existsSync('validation-results.json')) {
                feedback = JSON.parse(fs.readFileSync('validation-results.json', 'utf8'));
              } else {
                console.log('No validation-results.json found, creating default feedback');
              }
            } catch (error) {
              console.error('Error reading validation results:', error);
              feedback = { errors: [], warnings: [] };
            }
            
            let comment = `## Learning Room Validation Report\n\n`;
            
            if (feedback.errors.length === 0 && feedback.warnings.length === 0) {
              comment += `✅ **Great work!** Your changes look good!\n\n`;
            } else {
              if (feedback.errors.length > 0) {
                comment += `### ❌ Required Fixes\n`;
                feedback.errors.forEach(err => {
                  const helpUrl = err.help_url || '../../docs/appendix-e-github-flavored-markdown.md';
                  comment += `- **${err.file}**: ${err.message}\n`;
                  comment += `  [→ Learn more](${helpUrl})\n\n`;
                });
              }
              
              if (feedback.warnings.length > 0) {
                comment += `### ⚠️ Suggestions\n`;
                feedback.warnings.forEach(warn => {
                  comment += `- **${warn.file}**: ${warn.message}\n`;
                });
                comment += `\n`;
              }
            }
            
            comment += `### 📚 Resources\n`;
            comment += `- [Markdown Guide](../../docs/appendix-e-github-flavored-markdown.md)\n`;
            comment += `- [Accessibility Standards](../../docs/appendix-c-accessibility-standards.md)\n`;
            comment += `- [Accessible Content Tips](../../docs/07-culture-etiquette.md)\n`;
            
            try {
              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: comment
              });
            } catch (error) {
              console.error('Error posting comment:', error);
            }
