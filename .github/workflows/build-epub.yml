name: Build EPUB, Word, and BRF

on:
  push:
    branches: [ main ]
    paths:
      - 'docs/**'
      - 'epub/metadata.yaml'
      - 'epub/epub.css'
      - 'epub/pdf.css'
      - 'scripts/build-epub.js'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Pandoc
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y pandoc

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build EPUB and Word
        run: node scripts/build-epub.js

      - name: Install liblouis (braille translator — no TTS needed)
        run: sudo apt-get install -y liblouis-bin python3-louis

      - name: Convert EPUB to BRF (Braille — no TTS required)
        continue-on-error: true
        run: |
          mkdir -p epub/brf
          # Pandoc extracts plain text from EPUB
          pandoc epub/git-going-with-github.epub -f epub -t plain -o /tmp/book.txt
          # Python + liblouis translates text → Grade 2 braille → NABCC ASCII BRF (no TTS, pure text)
          python3 - <<'EOF'
import louis, sys

NABCC = ' A1B\'K2L@CIF/MSP"E3H9O6R^DJG>NTQ,*5<-U8V.%[$+X!&;:4\\0Z7(_?W]#Y)='

def to_brf(ub):
    out = []
    for ch in ub:
        c = ord(ch)
        if 0x2800 <= c <= 0x283F:
            out.append(NABCC[c - 0x2800])
        else:
            out.append(ch if c < 128 else ' ')
    return ''.join(out)

with open('/tmp/book.txt', encoding='utf-8', errors='replace') as f:
    lines = f.read().split('\n')

brf = []
for line in lines:
    if line.strip():
        try:
            brf.append(to_brf(louis.translateString(['en-ueb-g2.ctb'], line)))
        except Exception:
            brf.append(line[:80])
    else:
        brf.append('')

out = '\n'.join(brf)
with open('epub/brf/git-going-with-github.brf', 'w', encoding='ascii', errors='replace') as f:
    f.write(out)
print(f"BRF written: {len(out)} bytes, {len(brf)} lines")
EOF
          ls -lh epub/brf/

      - name: Upload EPUB artifact
        uses: actions/upload-artifact@v4
        with:
          name: git-going-with-github-epub
          path: epub/git-going-with-github.epub
          retention-days: 90

      - name: Upload Word artifact
        uses: actions/upload-artifact@v4
        with:
          name: git-going-with-github-word
          path: epub/git-going-with-github.docx
          retention-days: 90

      - name: Upload BRF artifact
        uses: actions/upload-artifact@v4
        with:
          name: git-going-with-github-brf
          path: epub/brf/
          if-no-files-found: warn
          retention-days: 90
